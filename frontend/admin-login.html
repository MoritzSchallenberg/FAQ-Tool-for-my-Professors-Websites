<!DOCTYPE html>
<html lang="de">
<head>
    <title>Admin Login - FAQ Elektrotechnik/Elektronik</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="https://www.fh-aachen.de/typo3conf/ext/fhac_design_2012/Resources/Public/Css/FhOLD.css?1612433004" media="all">
    <link rel="stylesheet" type="text/css" href="/static/style.css" media="all">
</head>
<body class="full-layout">
<div id="seite">
    <div id="header">
        <div id="topnavi">Modul 8210518 <span data-course-name>Elektrotechnik/Elektronik</span> - FAQ Admin</div>
    </div>

    <div id="headnavi">
        <span class="passiv"><a href="/">FAQ Übersicht</a></span>
        <span class="passiv"><a href="/ask">Frage stellen</a></span>
        <span class="passiv"><a href="/admin-login">Admin</a></span>
    </div>

    <div id="logo">
        <a href="/" title="FAQ Startseite">
            <img src="https://services.fh-aachen.de/img/fh-logo-left.svg" width="57" height="194" alt="LOGO der FH Aachen" title="zur FAQ Startseite">
        </a>
    </div>

    <div id="inhalt" class="csc-default">
        <h3>Admin-Login</h3>
        <p>Dieser Bereich ist für den Professor oder die betreuenden Personen gedacht.</p>

        <div id="login-message" class="message" hidden></div>

        <form id="admin-login-form">
            <div class="form-row">
                <label for="admin-username">Benutzername:</label>
                <input type="text" id="admin-username" required autocomplete="username">
            </div>

            <div class="form-row">
                <label for="admin-password">Passwort:</label>
                <input type="password" id="admin-password" required autocomplete="current-password">
            </div>

            <input type="submit" value="Einloggen">
        </form>
    </div>
    <div style="clear: both;"></div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
