<!DOCTYPE html>
<html lang="de">
<head>
    <title>Frage stellen - FAQ Elektrotechnik/Elektronik</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="https://www.fh-aachen.de/typo3conf/ext/fhac_design_2012/Resources/Public/Css/FhOLD.css?1612433004" media="all">
    <link rel="stylesheet" type="text/css" href="/static/style.css" media="all">
</head>
<body class="full-layout">
<div id="seite">
    <div id="header">
        <div id="topnavi">Modul 8210518 <span data-course-name>Elektrotechnik/Elektronik</span> - FAQ</div>
    </div>

    <div id="headnavi">
        <span class="passiv"><a href="/">FAQ Übersicht</a></span>
        <span class="passiv"><a href="/ask">Frage stellen</a></span>
        <span class="passiv"><a href="/admin-login">Admin</a></span>
    </div>

    <div id="logo">
        <a href="/" title="FAQ Startseite">
            <img src="https://services.fh-aachen.de/img/fh-logo-left.svg" width="57" height="194" alt="LOGO der FH Aachen" title="zur FAQ Startseite">
        </a>
    </div>

    <div id="inhalt" class="csc-default">
        <h3>Neue Frage stellen</h3>
        <p>Die Frage wird zunächst gespeichert und erscheint erst öffentlich, nachdem sie beantwortet und freigegeben wurde.</p>

        <div id="ask-message" class="message" hidden></div>

        <form id="ask-form">
            <div class="form-row">
                <label for="question-category">Kategorie:</label>
                <select id="question-category" required></select>
            </div>

            <div class="form-row">
                <label for="question-text">Frage:</label>
                <textarea id="question-text" required maxlength="2000" placeholder="Bitte formulieren Sie Ihre Frage möglichst konkret."></textarea>
            </div>

            <div class="hidden-field" aria-hidden="true">
                <label for="website">Dieses Feld bitte leer lassen:</label>
                <input type="text" id="website" tabindex="-1" autocomplete="off">
            </div>

            <input type="submit" value="Frage absenden">
            <a href="/">Zurück zur FAQ Übersicht</a>
        </form>
    </div>
    <div style="clear: both;"></div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
